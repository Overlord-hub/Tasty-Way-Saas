spring.application.name=Tasty Way Saas

# \u041A\u043E\u043D\u0444\u0456\u0433\u0443\u0440\u0430\u0446\u0456\u044F \u043F\u0456\u0434\u043A\u043B\u044E\u0447\u0435\u043D\u043D\u044F \u0434\u043E \u0441\u0442\u0432\u043E\u0440\u0435\u043D\u043E\u0457 \u0432 Workbench \u0411\u0414
spring.datasource.url=jdbc:mysql://localhost:3306/tasty_way_saas?useSSL=false&serverTimezone=UTC&useUnicode=yes&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=A12561n358xm
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# \u041D\u0430\u043B\u0430\u0448\u0442\u0443\u0432\u0430\u043D\u043D\u044F Hibernate JPA
spring.jpa.hibernate.ddl-auto=update

# \u0412\u0438\u043C\u0438\u043A\u0430\u0454\u043C\u043E \u0434\u0443\u0431\u043B\u044E\u0432\u0430\u043D\u043D\u044F SQL-\u0437\u0430\u043F\u0438\u0442\u0456\u0432 \u0443 \u043A\u043E\u043D\u0441\u043E\u043B\u044C IDE
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.open-in-view=true

# \u041D\u0430\u043B\u0430\u0448\u0442\u0443\u0432\u0430\u043D\u043D\u044F Thymeleaf \u0434\u043B\u044F \u0440\u043E\u0431\u043E\u0442\u0438 \u0437 HTML5
spring.thymeleaf.cache=false
spring.thymeleaf.suffix=.html
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# \u041E\u0431\u043C\u0435\u0436\u0435\u043D\u043D\u044F \u043D\u0430 \u0437\u0430\u0432\u0430\u043D\u0442\u0430\u0436\u0435\u043D\u043D\u044F \u043C\u0435\u0434\u0456\u0430-\u0444\u0430\u0439\u043B\u0456\u0432 (\u043A\u0430\u0440\u0442\u0438\u043D\u043A\u0438 \u0441\u0442\u0440\u0430\u0432)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB