<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація закладу | Tasty Way SaaS</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans antialiased selection:bg-amber-600 selection:text-white">

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative p-6 border-x border-stone-200/50 justify-center">

  <header class="text-center mb-8">
    <div class="inline-block w-12 h-12 rounded-2xl bg-amber-600/10 flex items-center justify-center text-2xl mb-3 shadow-sm">
      🚀
    </div>
    <h1 class="text-2xl font-black tracking-tight text-stone-900">Tasty Way SaaS</h1>
    <p class="text-xs text-stone-500 mt-1 font-medium uppercase tracking-wider">Реєстрація закладу та кабінету власника</p>
  </header>

  <div th:if="${error}" class="mb-5 bg-red-50 border border-red-200 text-red-700 text-xs font-semibold px-4 py-3 rounded-xl relative shadow-sm" role="alert">
    <span th:text="${error}">Помилка реєстрації.</span>
  </div>

  <form th:action="@{/register}" th:object="${regForm}" method="post" class="space-y-5">

    <div>
      <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2">1. Інформація про ресторан (Тенант)</label>
      <div class="bg-stone-50/50 border border-stone-200/40 rounded-2xl p-4 space-y-4">

        <div>
          <label for="restaurantName" class="block text-xs font-bold text-stone-700 mb-1">Назва закладу</label>
          <input type="text" th:field="*{restaurantName}" id="restaurantName"
                 class="w-full bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm text-stone-800 focus:outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition-all placeholder:text-stone-300"
                 placeholder="Напр: Кав'ярня Чехович, Суші Експрес" required>
        </div>

        <div>
          <label for="restaurantSlug" class="block text-xs font-bold text-stone-700 mb-1">Посилання ресторану (Slug)</label>
          <div class="flex rounded-xl shadow-sm border border-stone-200 overflow-hidden bg-white focus-within:border-amber-600 focus-within:ring-1 focus-within:ring-amber-600 transition-all">
            <span class="bg-stone-100 text-stone-400 px-3 py-2 text-xs font-medium flex items-center select-none border-r border-stone-200">/r/</span>
            <input type="text" th:field="*{restaurantSlug}" id="restaurantSlug"
                   class="w-full bg-white px-3 py-2 text-sm text-stone-800 focus:outline-none placeholder:text-stone-300"
                   placeholder="chehovich" pattern="^[a-z0-9\-]+$" title="Тільки латиниця, цифри та дефіси" required>
          </div>
          <p class="text-[10px] text-stone-400 mt-1.5 leading-relaxed font-medium">
            Використовується для генерації унікального QR-коду столів (лише маленькі латинські літери, цифри, дефіс).
          </p>
        </div>

      </div>
    </div>

    <div>
      <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2">2. Обліковий запис Власника (Адміністратора)</label>
      <div class="bg-stone-50/50 border border-stone-200/40 rounded-2xl p-4 space-y-4">

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="firstName" class="block text-xs font-bold text-stone-700 mb-1">Ім'я</label>
            <input type="text" th:field="*{firstName}" id="firstName"
                   class="w-full bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm text-stone-800 focus:outline-none focus:border-amber-600 transition-all placeholder:text-stone-300"
                   placeholder="Олександр" required>
          </div>
          <div>
            <label for="lastName" class="block text-xs font-bold text-stone-700 mb-1">Прізвище</label>
            <input type="text" th:field="*{lastName}" id="lastName"
                   class="w-full bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm text-stone-800 focus:outline-none focus:border-amber-600 transition-all placeholder:text-stone-300"
                   placeholder="Петренко" required>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="username" class="block text-xs font-bold text-stone-700 mb-1">Логін (Username)</label>
            <input type="text" th:field="*{username}" id="username"
                   class="w-full bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm text-stone-800 focus:outline-none focus:border-amber-600 transition-all placeholder:text-stone-300"
                   placeholder="manager_lviv" required>
          </div>
          <div>
            <label for="password" class="block text-xs font-bold text-stone-700 mb-1">Пароль</label>
            <input type="password" th:field="*{password}" id="password"
                   class="w-full bg-white border border-stone-200 rounded-xl px-3 py-2 text-sm text-stone-800 focus:outline-none focus:border-amber-600 transition-all placeholder:text-stone-300"
                   placeholder="••••••••" required>
          </div>
        </div>

      </div>
    </div>

    <div>
      <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2">3. Ліцензія платформи</label>
      <div class="bg-stone-50/50 border border-stone-200/40 rounded-2xl p-4">
        <div>
          <label for="activationCode" class="block text-xs font-bold text-stone-700 mb-1">Ключ активації (UUID)</label>
          <input type="text" th:field="*{activationCode}" id="activationCode"
                 class="w-full bg-white border border-stone-200 rounded-xl px-3 py-2 text-xs font-mono text-stone-800 focus:outline-none focus:border-amber-600 transition-all placeholder:text-stone-300 tracking-wider"
                 placeholder="Скопіюйте UUID ключ з панелі суберадімна" required>
          <p class="text-[10px] text-stone-400 mt-1.5 leading-relaxed font-medium">
            Одноразовий токен доступу.
          </p>
        </div>
      </div>
    </div>

    <div class="pt-2">
      <button type="submit"
              class="w-full bg-stone-900 hover:bg-amber-600 text-white font-bold py-4 rounded-xl transition-all cursor-pointer shadow-md text-center uppercase tracking-wider text-xs">
        Створити ресторан та акаунт
      </button>
    </div>

    <div class="text-center pt-2">
      <span class="text-xs text-stone-500 font-medium">Вже зареєстровані у системі?</span>
      <a th:href="@{/login}" class="text-xs font-bold text-amber-700 hover:text-amber-800 ml-1 transition-colors">Увійти</a>
    </div>
  </form>
</div>

<script>
  // Нативний JavaScript-валідатор для автоматичного очищення тексту в полі Slug
  document.getElementById('restaurantSlug').addEventListener('input', function (e) {
    this.value = this.value.toLowerCase()
            .replace(/\s+/g, '-')           // заміна пробілів на дефіси
            .replace(/[^a-z0-9\-]/g, '');   // видалення будь-яких символів окрім латиниці, цифр та дефісу
  });
</script>
</body>
</html>
