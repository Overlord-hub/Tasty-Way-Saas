<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Додати Страву | Tasty Way</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-100 text-stone-800 font-sans antialiased pb-24 md:pb-0">

<div class="flex min-h-screen">

  <div th:replace="~{manager/sidebar :: desktop-sidebar('menu')}"></div>

  <main class="flex-1 md:ml-64 p-4 md:p-8 w-full flex justify-center items-start">

    <div class="max-w-xl w-full bg-white border border-stone-200 rounded-2xl shadow-sm overflow-hidden">

      <div class="p-5 border-b border-stone-100 bg-stone-50/50 flex items-center justify-between">
        <div>
          <h2 class="text-lg font-black text-stone-900 tracking-tight">Нова позиція меню</h2>
          <p class="text-xs text-stone-500 mt-0.5">Заповніть дані для створення картки страви</p>
        </div>
        <a th:href="@{/manager/menu(restaurantId=${restaurantId})}" class="text-xs font-bold text-stone-400 hover:text-stone-600 transition-colors">
          Скасувати ✕
        </a>
      </div>

      <div th:if="${param.error}" class="m-5 p-4 bg-red-50 border border-red-200 text-red-700 text-xs font-bold rounded-xl flex items-center gap-2">
        ⚠️ Помилка: Не вдалося завантажити файл зображення. Спробуйте інше фото.
      </div>

      <form th:action="@{/manager/dish/save}" th:object="${dish}" method="POST" enctype="multipart/form-data" class="p-6 space-y-5">

        <input type="hidden" name="restaurantId" th:value="${restaurantId}">

        <div>
          <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1.5">Назва страви *</label>
          <input type="text" th:field="*{name}" required placeholder="Наприклад: Піца Кватро Формаджі"
                 class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-600 focus:ring-2 focus:ring-amber-600/10 text-sm transition-all bg-stone-50/30">
        </div>

        <div>
          <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1.5">Опис / Склад страви</label>
          <textarea th:field="*{description}" rows="3" placeholder="Опишіть інгредієнти, вагу або особливості подачі..."
                    class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-600 focus:ring-2 focus:ring-amber-600/10 text-sm transition-all bg-stone-50/30 resize-none"></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1.5">Ціна (в ₴) *</label>
            <input type="number" step="0.01" min="0" th:field="*{price}" required placeholder="0.00"
                   class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-600 focus:ring-2 focus:ring-amber-600/10 text-sm transition-all bg-stone-50/30 font-bold">
          </div>

          <div>
            <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1.5">Категорія меню *</label>
            <select name="categoryId" required
                    class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-600 focus:ring-2 focus:ring-amber-600/10 text-sm transition-all bg-stone-50/30 font-medium cursor-pointer">
              <option value="" disabled selected>Оберіть категорію...</option>
              <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Категорія</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1.5">Фотографія страви</label>
          <div class="border-2 border-dashed border-stone-200 rounded-2xl p-4 text-center bg-stone-50/30 hover:bg-stone-50 transition-colors relative cursor-pointer group">
            <input type="file" name="imageFile" accept="image/*" id="file-upload-input" onchange="previewFileName()"
                   class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            <div class="space-y-1">
              <span class="text-2xl block group-hover:scale-110 transition-transform">📸</span>
              <p id="file-upload-text" class="text-xs font-medium text-stone-500">Натисніть або перетягніть файл сюди</p>
              <p class="text-[10px] text-stone-400">Формати: JPG, PNG, WEBP (до 5 МБ)</p>
            </div>
          </div>
        </div>

        <div class="pt-2">
          <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3.5 rounded-xl transition-all cursor-pointer shadow-lg shadow-amber-600/10 text-center uppercase tracking-wider text-xs">
            Зберегти позицію в меню
          </button>
        </div>

      </form>
    </div>

  </main>
</div>

<div th:replace="~{manager/sidebar :: mobile-navbar('menu')}"></div>

<script>
  function previewFileName() {
    const input = document.getElementById('file-upload-input');
    const text = document.getElementById('file-upload-text');
    if (input.files && input.files.length > 0) {
      text.innerText = "Обрано файл: " + input.files[0].name;
      text.className = "text-xs font-bold text-amber-600";
    }
  }
</script>
</body>
</html>
