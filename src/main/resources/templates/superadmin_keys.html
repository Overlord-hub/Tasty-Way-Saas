<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Платформи | Tasty Way SaaS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-stone-100 text-stone-800 font-sans antialiased selection:bg-amber-600 selection:text-white">

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative p-6 border-x border-stone-200/50">

    <header class="p-4 border-b border-stone-100 flex items-center justify-between mb-6 bg-stone-50 rounded-2xl">
        <div>
            <h1 class="text-lg font-black tracking-tight text-stone-900">Tasty Way SaaS</h1>
            <p class="text-[10px] text-stone-400 mt-0.5 font-bold uppercase tracking-wider">Панель Управління Ліцензіями</p>
        </div>
        <div class="w-2.5 h-2.5 rounded-full bg-red-600 shadow-inner animate-pulse"></div>
    </header>

    <div class="mb-6">
        <form th:action="@{/superadmin/keys/generate}" method="post">
            <button type="submit"
                    class="w-full bg-stone-900 hover:bg-amber-600 text-white font-bold py-4 rounded-xl transition-all cursor-pointer shadow-md text-center uppercase tracking-wider text-xs">
                ✨ Згенерувати одноразовий ключ (UUID)
            </button>
        </form>
    </div>

    <div class="flex-1 flex flex-col">
        <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-3">Наявні ключі в базі даних</label>

        <div class="space-y-3 overflow-y-auto max-h-[60vh] pr-1">

            <div th:if="${#lists.isEmpty(keys)}" class="text-center py-12 border border-dashed border-stone-200 rounded-2xl">
                <span class="text-3xl block mb-2">🔑</span>
                <p class="text-xs text-stone-400 font-medium">Жодного ключа ще не згенеровано</p>
            </div>

            <div th:each="key : ${keys}"
                 class="border rounded-2xl p-4 transition-all flex flex-col gap-2"
                 th:classappend="${key.used} ? 'bg-stone-50/70 border-stone-200/40 opacity-60' : 'bg-emerald-50/30 border-emerald-200/60'">

                <div class="flex items-center justify-between">
                    <span th:if="${!key.used}" class="px-2 py-0.5 bg-emerald-600 text-white text-[9px] font-black rounded-md uppercase tracking-wide">Вільний</span>
                    <span th:if="${key.used}" class="px-2 py-0.5 bg-stone-400 text-white text-[9px] font-black rounded-md uppercase tracking-wide">Використаний</span>

                    <span class="text-[10px] font-mono text-stone-400"
                          th:text="${#temporals.format(key.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2026</span>
                </div>

                <div class="flex items-center justify-between gap-2 mt-1">
                    <input type="text" th:value="${key.token}" readonly
                           class="w-full bg-white border border-stone-200 rounded-lg px-2.5 py-1.5 text-xs font-mono text-stone-700 focus:outline-none select-all shadow-sm">
                    <button onclick="copyToClipboard(this)"
                            class="bg-stone-100 hover:bg-stone-200 text-stone-600 text-[11px] font-bold px-2.5 py-1.5 rounded-lg transition-all cursor-pointer border border-stone-200/50">
                        Копія
                    </button>
                </div>
            </div>

        </div>
    </div>

</div>

<script>
    // Функція швидкого копіювання токена в буфер обміну при натисканні кнопки
    function copyToClipboard(button) {
        const input = button.parentElement.querySelector('input');
        input.select();
        document.execCommand('copy');

        const originalText = button.innerText;
        button.innerText = 'ОК!';
        button.className = "bg-emerald-600 text-white text-[11px] font-bold px-2.5 py-1.5 rounded-lg transition-all";
        setTimeout(() => {
            button.innerText = originalText;
            button.className = "bg-stone-100 hover:bg-stone-200 text-stone-600 text-[11px] font-bold px-2.5 py-1.5 rounded-lg transition-all cursor-pointer border border-stone-200/50";
        }, 1000);
    }
</script>
</body>
</html>
