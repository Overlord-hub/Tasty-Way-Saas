<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${restaurant.name}">Цифрове Меню</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .screen { transition: opacity 0.2s ease-in-out; }
        .hidden-screen { display: none; opacity: 0; }
        .active-screen { display: flex; opacity: 1; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans antialiased selection:bg-amber-600 selection:text-white">

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative pb-24 border-x border-stone-200/50">

    <header class="p-5 border-b border-stone-100 bg-white/90 backdrop-blur-md sticky top-0 z-40 flex items-center justify-between shadow-sm">
        <div>
            <h1 class="text-xl font-bold tracking-tight text-stone-900" th:text="${restaurant.name}">Назва...</h1>
            <p class="text-xs text-stone-500 mt-0.5 font-medium">Стіл № <span id="table-num-display" class="text-amber-600 font-bold" th:text="${tableNumber}">0</span></p>
        </div>
        <div class="w-3 h-3 rounded-full shadow-inner animate-pulse" th:style="'background-color: ' + ${restaurant.themeColor}"></div>
    </header>

    <main id="menu-screen" class="screen active-screen p-4 flex-1 flex-col">
        <div class="flex gap-2 overflow-x-auto pb-2 mb-4 scrollbar-none w-full">
            <button onclick="filterCategory('all')" class="cat-btn px-4 py-2 bg-amber-600 text-white text-xs font-bold rounded-full whitespace-nowrap shadow-md shadow-amber-600/10 transition-all cursor-pointer uppercase tracking-wider">
                Все меню
            </button>
            <button th:each="cat : ${categories}"
                    th:onclick="'filterCategory(' + ${cat.id} + ')'"
                    th:text="${cat.name}"
                    class="cat-btn px-4 py-2 bg-stone-100 hover:bg-stone-200/70 text-stone-600 text-xs font-bold rounded-full whitespace-nowrap transition-all cursor-pointer uppercase tracking-wider border border-stone-200/20">
                Категорія
            </button>
        </div>

        <div class="space-y-4 w-full">
            <div th:each="dish : ${dishes}"
                 th:data-category="${dish.category.id}"
                 class="dish-card bg-stone-50/50 border border-stone-200/40 rounded-2xl p-4 flex items-center justify-between gap-4 transition-all hover:shadow-md">

                <div class="flex-1 min-w-0">
                    <h3 class="text-base font-bold text-stone-900 tracking-wide truncate" th:text="${dish.name}">Назва страви</h3>
                    <p class="text-xs text-stone-500 mt-1 line-clamp-2 leading-relaxed" th:text="${dish.description}">Опис страви</p>

                    <div class="flex items-center justify-between mt-4">
                        <div>
                            <div th:if="${promoService.hasDiscount(dish, restaurant.id)}" class="flex flex-col">
                                <span class="text-stone-400 line-through text-[11px] font-medium" th:text="${dish.price} + ' ₴'">0.00 ₴</span>
                                <span class="text-amber-700 font-black text-base" th:text="${promoService.calculateDiscountPrice(dish, restaurant.id)} + ' ₴'">0.00 ₴</span>
                            </div>
                            <div th:unless="${promoService.hasDiscount(dish, restaurant.id)}">
                                <span class="text-stone-900 font-black text-base" th:text="${dish.price} + ' ₴'">0.00 ₴</span>
                            </div>
                        </div>

                        <button th:data-id="${dish.id}"
                                th:data-name="${dish.name}"
                                th:data-price="${promoService.calculateDiscountPrice(dish, restaurant.id)}"
                                th:data-old-price="${dish.price}"
                                onclick="addToCart(this.getAttribute('data-id'), this.getAttribute('data-name'), this.getAttribute('data-price'), this.getAttribute('data-old-price'))"
                                class="bg-stone-900 hover:bg-amber-600 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all cursor-pointer shadow-sm">
                            Додати +
                        </button>
                    </div>
                </div>

                <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-xl overflow-hidden border border-stone-200 bg-stone-100 flex-shrink-0 shadow-sm">
                    <img th:if="${dish.imageDish != null && !dish.imageDish.empty}"
                         th:src="@{'/uploads/' + ${dish.imageDish}}"
                         class="w-full h-full object-cover transition-transform duration-300 hover:scale-105"
                         alt="Фото страви">
                    <div th:unless="${dish.imageDish != null && !dish.imageDish.empty}"
                         class="w-full h-full flex items-center justify-center text-2xl bg-stone-50">
                        🍽️
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="cart-screen" class="screen hidden-screen p-4 flex-1 flex-col">
        <h2 class="text-lg font-bold mb-4 text-stone-900 w-full">Ваше замовлення</h2>
        <div id="cart-items-container" class="space-y-3 mb-6 w-full"></div>

        <div class="bg-stone-50 border border-stone-200/60 rounded-2xl p-4 mb-6 w-full">
            <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-3">Спосіб оплати</label>
            <div class="grid grid-cols-2 gap-3">
                <label class="flex flex-col items-center justify-center p-3 border-2 border-amber-600 bg-amber-600/5 rounded-xl cursor-pointer" id="pay-cash-label">
                    <input type="radio" name="payment" value="CASH" checked onchange="togglePaymentStyle()" class="accent-amber-600 mb-1">
                    <span class="text-xs font-bold text-stone-800">Готівка</span>
                </label>
                <label class="flex flex-col items-center justify-center p-3 border border-stone-200 bg-white rounded-xl cursor-pointer hover:bg-stone-100" id="pay-card-label">
                    <input type="radio" name="payment" value="CARD" onchange="togglePaymentStyle()" class="accent-amber-600 mb-1">
                    <span class="text-xs font-bold text-stone-600">Термінал</span>
                </label>
            </div>
        </div>

        <div id="cart-discount-display" class="w-full"></div>

        <div class="flex items-center justify-between px-2 mb-6 border-t border-stone-100 pt-4 w-full">
            <span class="text-stone-500 text-sm font-medium">Разом до сплати:</span>
            <span id="cart-total-price" class="text-2xl font-black text-stone-900">0.00 ₴</span>
        </div>

        <button onclick="submitOrderToServer()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-4 rounded-xl transition-all cursor-pointer shadow-lg shadow-amber-600/10 text-center uppercase tracking-wider text-sm">
            Оформити замовлення
        </button>
    </main>

    <main id="thank-screen" class="screen hidden-screen p-6 flex-1 flex-col items-center justify-center text-center my-auto">
        <div class="w-20 h-20 bg-stone-50 border border-stone-200/60 rounded-full flex items-center justify-center mb-6 text-3xl shadow-sm animate-bounce">
            🍔
        </div>
        <h2 class="text-2xl font-black text-stone-900 mb-2 tracking-tight">Смачного!</h2>
        <p class="text-sm text-stone-500 max-w-xs leading-relaxed mb-8 px-4">
            Ваше замовлення вже передано шеф-кухарю на кухню. Офіціант винесе страви, як тільки вони будуть готові.
        </p>
        <button onclick="resetToMenu()" class="text-xs font-bold text-amber-700 border border-stone-200 px-6 py-3 rounded-full bg-stone-50 hover:bg-stone-100 transition-colors uppercase tracking-wider cursor-pointer">
            Подивитись меню знову
        </button>
    </main>

    <nav class="absolute bottom-0 left-0 right-0 p-4 border-t border-stone-100 bg-white/95 backdrop-blur-md flex items-center justify-around z-40 shadow-lg">
        <button onclick="switchScreen('menu')" class="flex flex-col items-center text-amber-600 cursor-pointer" id="nav-menu-btn">
            <span class="text-xl">🍽️</span>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-wide">Меню</span>
        </button>
        <button onclick="switchScreen('cart')" class="flex flex-col items-center text-stone-400 cursor-pointer relative" id="nav-cart-btn">
            <span class="text-xl">🛒</span>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-wide">Кошик</span>
            <span id="cart-badge" class="absolute -top-1 -right-2 bg-amber-700 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
        </button>
    </nav>
</div>

<script th:inline="javascript">
    const restaurantId = [[${restaurant.id}]];
    const tableNumber = [[${tableNumber}]];
    let cart = JSON.parse(localStorage.getItem('restaurant_cart')) || {};

    // Передаємо налаштування глобальної акції з бекенду (якщо вона створена)
    /*[# th:each="promo : ${promotions}"]*/
    /*[# th:if="${promo.targetDish == null && promo.targetCategory == null && promo.minOrderSum != null}"]*/
    const globalPromoMinSum = [[${promo.minOrderSum}]];
    const globalPromoValue = [[${promo.discountValue}]];
    const globalPromoType = [[${promo.type.name()}]];
    /*[/]*/
    /*[/]*/

    updateCartBadge();

    function filterCategory(catId) {
        const cards = document.querySelectorAll('.dish-card');
        cards.forEach(card => {
            if (catId === 'all' || card.getAttribute('data-category') == catId) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
        event.currentTarget.parentElement.querySelectorAll('button').forEach(b => b.className = 'cat-btn px-4 py-2 bg-stone-100 hover:bg-stone-200/70 text-stone-600 text-xs font-bold rounded-full whitespace-nowrap transition-all cursor-pointer uppercase tracking-wider border border-stone-200/20');
        event.currentTarget.className = 'cat-btn px-4 py-2 bg-amber-600 text-white text-xs font-bold rounded-full whitespace-nowrap shadow-md shadow-amber-600/10 transition-all cursor-pointer uppercase tracking-wider';
    }

    function addToCart(id, name, price, oldPrice) {
        if (cart[id]) {
            cart[id].quantity += 1;
        } else {
            cart[id] = {
                name: name,
                price: parseFloat(price),
                oldPrice: oldPrice ? parseFloat(oldPrice) : parseFloat(price),
                quantity: 1
            };
        }
        localStorage.setItem('restaurant_cart', JSON.stringify(cart));
        updateCartBadge();

        const b = document.getElementById('nav-cart-btn');
        b.classList.add('scale-110');
        setTimeout(() => b.classList.remove('scale-110'), 150);
    }

    function updateCartBadge() {
        const badge = document.getElementById('cart-badge');
        const totalItems = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
        if (totalItems > 0) {
            badge.innerText = totalItems;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    function switchScreen(screenName) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active-screen');
            s.classList.add('hidden-screen');
        });

        document.getElementById(screenName + '-screen').classList.add('active-screen');
        document.getElementById(screenName + '-screen').classList.remove('hidden-screen');

        document.getElementById('nav-menu-btn').className = screenName === 'menu' ? 'flex flex-col items-center text-amber-600 cursor-pointer' : 'flex flex-col items-center text-stone-400 cursor-pointer';
        document.getElementById('nav-cart-btn').className = screenName === 'cart' ? 'flex flex-col items-center text-amber-600 cursor-pointer relative' : 'flex flex-col items-center text-stone-400 cursor-pointer relative';

        if (screenName === 'cart') renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-items-container');
        container.innerHTML = '';
        let total = 0;
        let totalDiscount = 0;

        if (Object.keys(cart).length === 0) {
            container.innerHTML = '<div class="text-center py-12 w-full"><span class="text-4xl block mb-2">📥</span><p class="text-sm text-stone-400 font-medium">Ваш кошик порожній</p></div>';
            document.getElementById('cart-total-price').innerHTML = '<span class="text-2xl font-black text-stone-900">0.00 ₴</span>';
            const discountDisplay = document.getElementById('cart-discount-display');
            if (discountDisplay) discountDisplay.innerHTML = '';
            return;
        }

        Object.entries(cart).forEach(([id, item]) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            if (item.oldPrice > item.price) {
                totalDiscount += (item.oldPrice - item.price) * item.quantity;
            }

            container.innerHTML += `
                <div class="bg-stone-50 border border-stone-200/50 rounded-2xl p-4 flex items-center justify-between w-full">
                    <div>
                        <h4 class="text-sm font-bold text-stone-800">${item.name}</h4>
                        <p class="text-xs text-amber-700 font-extrabold mt-1">${item.price.toFixed(2)} ₴</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQuantity(${id}, -1)" class="w-8 h-8 rounded-xl bg-white border border-stone-200 flex items-center justify-center font-bold hover:bg-stone-100 text-stone-600 shadow-sm cursor-pointer">-</button>
                        <span class="text-sm font-bold w-4 text-center text-stone-800">${item.quantity}</span>
                        <button onclick="changeQuantity(${id}, 1)" class="w-8 h-8 rounded-xl bg-white border border-stone-200 flex items-center justify-center font-bold hover:bg-stone-100 text-stone-600 shadow-sm cursor-pointer">+</button>
                    </div>
                </div>
            `;
        });

        let finalTotal = total;
        let globalDiscount = 0;

        if (typeof globalPromoMinSum !== 'undefined' && total >= globalPromoMinSum) {
            if (globalPromoType === 'PERCENTAGE') {
                globalDiscount = total * (globalPromoValue / 100);
            } else if (globalPromoType === 'FLAT') {
                globalDiscount = globalPromoValue;
            }
            finalTotal = total - globalDiscount;
        }

        const discountDisplay = document.getElementById('cart-discount-display');
        if (discountDisplay) {
            let summaryHtml = '';
            if (totalDiscount > 0) {
                summaryHtml += `
                    <div class="flex items-center justify-between px-2 text-xs font-medium text-emerald-600 mb-1">
                        <span>Знижка на страви:</span>
                        <span>-${totalDiscount.toFixed(2)} ₴</span>
                    </div>
                `;
            }
            if (globalDiscount > 0) {
                summaryHtml += `
                    <div class="flex items-center justify-between px-2 text-xs font-bold text-emerald-600 mb-1 bg-emerald-50 p-2 rounded-xl border border-emerald-200/50">
                        <span>🔥 Активовано знижку від ${globalPromoMinSum} ₴:</span>
                        <span>-${globalDiscount.toFixed(2)} ₴</span>
                    </div>
                `;
            }
            discountDisplay.innerHTML = summaryHtml;
        }

        if (globalDiscount > 0) {
            document.getElementById('cart-total-price').innerHTML = `
                <div class="flex flex-col items-end">
                    <span class="text-xs text-stone-400 line-through font-medium">${total.toFixed(2)} ₴</span>
                    <span class="text-2xl font-black text-amber-700">${finalTotal.toFixed(2)} ₴</span>
                </div>
            `;
        } else {
            document.getElementById('cart-total-price').innerHTML = `<span class="text-2xl font-black text-stone-900">${total.toFixed(2)} ₴</span>`;
        }
    }

    function changeQuantity(id, amount) {
        if (!cart[id]) return;
        cart[id].quantity += amount;
        if (cart[id].quantity <= 0) delete cart[id];
        localStorage.setItem('restaurant_cart', JSON.stringify(cart));
        updateCartBadge();
        renderCart();
    }

    function togglePaymentStyle() {
        const cashRadio = document.querySelector('input[name="payment"][value="CASH"]');
        const cashLabel = document.getElementById('pay-cash-label');
        const cardLabel = document.getElementById('pay-card-label');

        if (cashRadio.checked) {
            cashLabel.className = "flex flex-col items-center justify-center p-3 border-2 border-amber-600 bg-amber-600/5 rounded-xl cursor-pointer";
            cardLabel.className = "flex flex-col items-center justify-center p-3 border border-stone-200 bg-white rounded-xl cursor-pointer hover:bg-stone-100";
        } else {
            cardLabel.className = "flex flex-col items-center justify-center p-3 border-2 border-amber-600 bg-amber-600/5 rounded-xl cursor-pointer";
            cashLabel.className = "flex flex-col items-center justify-center p-3 border border-stone-200 bg-white rounded-xl cursor-pointer hover:bg-stone-100";
        }
    }

    function submitOrderToServer() {
        if (Object.keys(cart).length === 0) return;
        const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
        const payload = {};
        Object.entries(cart).forEach(([id, item]) => { payload[id] = item.quantity; });

        fetch(`/api/orders/create?restaurantId=${restaurantId}&tableNumber=${tableNumber}&paymentMethod=${paymentMethod}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    cart = {};
                    localStorage.removeItem('restaurant_cart');
                    updateCartBadge();
                    switchScreen('thank');
                } else {
                    alert('Помилка: ' + data.message);
                }
            })
            .catch(err => alert('Помилка з`єднання з сервером'));
    }

    function resetToMenu() { switchScreen('menu'); }
</script>
</body>
</html>
